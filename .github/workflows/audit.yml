name: Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Type-check
        run: npm run typecheck

      - name: Lint DS internal imports(防 consumer 用 internal path)
        run: npm run lint:imports

      - name: Build all apps
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: A11y audit consumer apps(WCAG 2 A + AA)
        # Phase 5 加 — DS repo 跑 npm run a11y:check on storybook;ds-product-template
        # 跑 audit-consumer-a11y.mjs on apps/*/dist。對等 DS audit 嚴謹度。
        run: node scripts/audit-consumer-a11y.mjs
