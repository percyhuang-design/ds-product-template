# 2026-05-26 對齊 DS repo pattern(netlify.toml + Netlify Git integration)
# Per user 「為何要設這個 secret?」challenge — DS repo 就沒用 secret,直接 Netlify 連 repo auto-build。
#
# Fork-and-go 流程(painless,無需 GitHub secret):
#   1. Netlify Dashboard → New site → 連 fork 後的 product-workspace repo
#   2. Netlify 自動讀本 file → build storybook-static → deploy
#   3. 完成。每次 push main → Netlify auto rebuild。
#
# 對應 apps/_template app deploy 走另一條路(.github/workflows/deploy.yml + Netlify secret)—
# 因為 _template 是 monorepo sub-dir build,要從 root npm install 全 workspaces 再 cd apps/_template build,
# Netlify Git integration 不適合(會在 root run build,但 publish dir 在 sub-dir)。

[build]
  command = "npm run build-storybook"
  publish = "storybook-static"

[build.environment]
  NODE_VERSION = "22"

# Per-branch deploy previews 預設啟用(任何 branch push → 自動 preview URL)
# Production deploy 走 main(production URL = 永遠最新 main 的 storybook)

# ─── Access control(2026-05-26 per user 「不是所有人都看得到」directive)────────
# Netlify deploy 預設 site URL 公開可訪問。Storybook 含內部產品 UI / DS 元件 demo,
# 必須限團隊內部存取。**至少 2 道防線**:
#
# 1️⃣ Defense-in-depth(本檔做):反 SEO indexing
#    Headers 加 X-Robots-Tag noindex(Google/Bing 不收錄)+ Referrer-Policy strict-origin
#    搜尋引擎不主動 leak URL,但仍能直接訪問 URL,所以還需第 2 道。
#
# 2️⃣ Real auth gate(user 必須在 Netlify Dashboard 設):
#    Site settings → Access & security → Visitor access →「Password protect site」
#    需 Netlify Pro plan($19/month per member,team plan included)
#    OR Netlify Identity widget(免費 plan 限 5 users)
#    OR Cloudflare Access proxy(免費 plan auth gating)
#
# 完整 step-by-step 詳 README「Access control」段。

[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
